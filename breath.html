<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <title>Breathing Pacer</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; background: #f0f4f8; }
        #circle { width: 200px; height: 200px; border-radius: 50%; background: #3498db; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.5rem; transition: transform 4s linear; margin: 20px; }
        .controls { margin-top: 20px; }
    </style>
</head>
<body>

    <h1>Breathing Pacer</h1>
    <div id="circle">Start</div>
    
    <div class="controls">
        <label>Duration: </label>
        <select id="duration">
            <option value="1">1 Minute</option>
            <option value="2">2 Minutes</option>
            <option value="5">5 Minutes</option>
        </select>
        <button onclick="startBreathing()">Start Session</button>
    </div>

    <script>
        const circle = document.getElementById('circle');
        let isRunning = false;

        async function startBreathing() {
            if (isRunning) return;
            isRunning = true;
            const minutes = document.getElementById('duration').value;
            const endTime = Date.now() + minutes * 60 * 1000;

            while (Date.now() < endTime) {
                await phase("Inhale", 4000, 1.5);
                await phase("Hold", 4000, 1.5);
                await phase("Exhale", 4000, 1.0);
                await phase("Hold", 4000, 1.0);
            }
            circle.innerText = "Done";
            isRunning = false;
        }

        function phase(text, ms, scale) {
            return new Promise(resolve => {
                circle.innerText = text;
                circle.style.transform = `scale(${scale})`;
                setTimeout(resolve, ms);
            });
        }
    </script>
</body>
</html>
