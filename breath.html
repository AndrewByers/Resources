<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breathing Pacer</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; background: #f0f4f8; margin: 0; padding: 20px; }
        #circle { width: 220px; height: 220px; border-radius: 50%; background: #3498db; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.8rem; font-weight: bold; transition: transform 4s linear; margin: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #progress-container { width: 100%; max-width: 300px; height: 20px; background: #ddd; border-radius: 10px; overflow: hidden; margin-top: 20px; }
        #progress-bar { width: 0%; height: 100%; background: #27ae60; transition: width 0.3s linear; }
        .controls { margin-top: 30px; text-align: center; }
        select, button { padding: 10px 20px; font-size: 1rem; border-radius: 5px; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <h1>Breathing Pacer</h1>
    <div id="circle">Ready</div>
    
    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>
    
    <div class="controls">
        <label for="duration">Duration: </label>
        <select id="duration">
            <option value="1">1 Minute</option>
            <option value="2">2 Minutes</option>
            <option value="5">5 Minutes</option>
        </select>
        <button onclick="startBreathing()">Start Session</button>
    </div>

    <script>
        const circle = document.getElementById('circle');
        const progressBar = document.getElementById('progress-bar');
        let isRunning = false;

        async function startBreathing() {
            if (isRunning) return;
            isRunning = true;
            const minutes = parseInt(document.getElementById('duration').value);
            const totalMs = minutes * 60 * 1000;
            const startTime = Date.now();
            const endTime = startTime + totalMs;

            while (Date.now() < endTime) {
                const elapsed = Date.now() - startTime;
                progressBar.style.width = `${(elapsed / totalMs) * 100}%`;
                
                await phase("Inhale", 4000, 1.5);
                await phase("Hold", 4000, 1.5);
                await phase("Exhale", 4000, 1.0);
                await phase("Hold", 4000, 1.0);
            }
            circle.innerText = "Done";
            progressBar.style.width = "100%";
            isRunning = false;
        }

        function phase(text, ms, scale) {
            return new Promise(resolve => {
                circle.innerText = text;
                circle.style.transform = `scale(${scale})`;
                setTimeout(resolve, ms);
            });
        }
    </script>
</body>
</html>
