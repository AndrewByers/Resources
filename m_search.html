        const data = [];
        const rows = csvData.trim().split('\n');
        const headers = rows[0].split(',');

        for (let i = 1; i < rows.length; i++) {
            const obj = {};
            const vals = rows[i].split(',');
            headers.forEach((h, j) => obj[h.trim()] = vals[j]);
            data.push(obj);
        }

        function renderList(filteredData) {
            const list = document.getElementById('contactList');
            list.innerHTML = '';
            filteredData.forEach((item) => {
                const div = document.createElement('div');
                div.className = 'card';
                // Uses the first two columns for the card title
                div.innerHTML = `<strong>${item[headers[0]]} ${item[headers[1]]}</strong>`;
                div.onclick = () => showDetails(item);
                list.appendChild(div);
            });
        }

        function showDetails(item) {
            document.getElementById('contactList').style.display = 'none';
            document.getElementById('searchInput').style.display = 'none';
            const details = document.getElementById('detailsView');
            details.style.display = 'block';
            
            let html = `<h3>Details</h3>`;
            // Loops through every header to create a dynamic list
            headers.forEach(h => {
                html += `<div class="detail-item"><strong>${h}:</strong> ${item[h] || 'N/A'}</div>`;
            });
            
            html += `<button class="back-btn" onclick="location.reload()">Back</button>`;
            details.innerHTML = html;
        }

        function filterContacts() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = data.filter(c => 
                Object.values(c).some(val => val.toLowerCase().includes(query))
            );
            renderList(filtered);
        }

        renderList(data);
    </script>
